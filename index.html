<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苗寶雲端字卡系統 (完整功能色系版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMqOn8ihqPxWP7L1rKMMH07t8Y8QSX_Zs",
            authDomain: "miaocard.firebaseapp.com",
            projectId: "miaocard",
            storageBucket: "miaocard.firebasestorage.app",
            messagingSenderId: "39206538337",
            appId: "1:39206538337:web:8b1712d916038e4ce6ae20",
            measurementId: "G-5V0PWWG70Z"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        setPersistence(auth, browserLocalPersistence).catch(console.error);

        const Icons = {
            PlusCircle: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-16 h-16 text-blue-300 mx-auto mb-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>,
            Plus: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Trash2: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            Edit: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            X: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            RotateCcw: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>,
            ChevronLeft: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
            ChevronRight: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
            SkipBack: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>,
            List: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
            Shuffle: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>,
            Download: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Upload: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            FileText: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
            Cloud: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19c3.037 0 5.5-2.463 5.5-5.5 0-2.77-2.053-5.06-4.73-5.412C17.343 4.316 14.113 1.5 10 1.5 6.012 1.5 2.71 3.99 1.63 7.428 0.7 8.24 0 9.54 0 11c0 2.21 1.79 4 4 4h13.5"/></svg>,
            Volume2: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
        };

        const App = () => {
            // 預設顏色
            const DEFAULT_COLOR = "#503422";

            const [user, setUser] = React.useState(null);
            const [decks, setDecks] = React.useState([]);
            const [activeCategoryIndex, setActiveCategoryIndex] = React.useState(0);
            const [currentCardIndex, setCurrentCardIndex] = React.useState(0);
            const [filterStatus, setFilterStatus] = React.useState('all'); 
            const [flipOrder, setFlipOrder] = React.useState('FMB'); 
            const [selectedCards, setSelectedCards] = React.useState(new Set()); 
            const [modalState, setModalState] = React.useState({ isOpen: false, type: null });
            const [flipAngle, setFlipAngle] = React.useState(0);
            const [formData, setFormData] = React.useState({ deckName: '', cardFront: '', cardMiddle: '', cardBack: '', note: '', importText: '', importMode: 'append', newDeckName: '', cardType: '2sided', editIndex: null });
            const fileInputRef = React.useRef(null);
            
            // 監聽登入
            React.useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    if (!currentUser) setDecks([]);
                });
                return () => unsubscribe();
            }, []);

            // 監聽雲端數據
            React.useEffect(() => {
                if (!user) return;
                const unsub = onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                    if (docSnap.exists()) setDecks(docSnap.data().decks || []);
                });
                return () => unsub();
            }, [user]);

            const syncToCloud = async (newDecks) => { if (user) await setDoc(doc(db, "users", user.uid), { decks: newDecks }); };
            const updateDecks = (newDecks) => { setDecks(newDecks); syncToCloud(newDecks); };
            const handleLogin = () => signInWithPopup(auth, provider);
            const handleLogout = () => signOut(auth);

            // 資料計算邏輯
            const currentCategory = decks[activeCategoryIndex] || null;
            const allCards = currentCategory?.cards || [];
            const currentDeckColor = currentCategory?.color || DEFAULT_COLOR;
            
            const currentCardsWithIdx = allCards.map((c, idx) => ({ 
                ...c, 
                status: c.status || (c.isStarred ? 'mastered' : 'unrated'), 
                originalIndex: idx 
            }));
            const currentCards = filterStatus === 'all' ? currentCardsWithIdx : currentCardsWithIdx.filter(c => c.status === filterStatus);
            const currentCard = currentCards[currentCardIndex] || null;
            const totalCards = currentCards.length;
            const is3Sided = Boolean(currentCard && currentCard.middle);

            // 快捷鍵
            React.useEffect(() => {
                const handleKeyDown = (e) => {
                    if (modalState.isOpen || !user) return;
                    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
                    if (e.key === 'ArrowRight') handleNext();
                    else if (e.key === 'ArrowLeft') handlePrev();
                    else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); handleFlip(); }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [currentCardIndex, flipAngle, totalCards, modalState.isOpen, user]);

            // 操作函式
            const handleUpdateDeckColor = (newColor) => {
                const newDecks = [...decks];
                newDecks[activeCategoryIndex].color = newColor;
                updateDecks(newDecks);
            };

            const handleExport = () => {
                const dataStr = JSON.stringify(decks, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `flashcards_backup.json`; a.click();
            };

            const handleFileChange = (event) => {
                const file = event.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        if (Array.isArray(importedData) && window.confirm("確定要覆蓋雲端資料嗎？")) updateDecks(importedData);
                    } catch (err) { alert("讀取失敗"); }
                };
                reader.readAsText(file);
            };

            const handleSpeak = (e, text) => {
                if (e) e.stopPropagation();
                if (!text || !window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                if (/[\u3040-\u309f]/.test(text)) u.lang = 'ja-JP';
                else if (/^[A-Za-z]/.test(text)) u.lang = 'en-US';
                else u.lang = 'zh-TW';
                window.speechSynthesis.speak(u);
            };

            const handleCopyAIPrompt = (type) => {
                const promptText = type === '2sided' 
                    ? "請幫我製作字卡，並嚴格使用以下格式輸出：\n\n【正面】：(題目)\n【背面】：(解釋)\n\n請給我至少 10 個單字。"
                    : "請幫我製作字卡，並嚴格使用以下格式輸出：\n\n【正面】：(單字)\n【中間】：(假名/發音)\n【背面】：(中文解釋)\n\n請給我至少 10 個單字。";
                navigator.clipboard.writeText(promptText).then(() => alert("✅ 已複製提示詞！"));
            };

            const handleTextImport = () => {
                if (!formData.importText.trim()) return;
                const cards = [];
                const blocks = formData.importText.split(/【正面】(?:：|:)?/).filter(b => b.trim() !== '');
                blocks.forEach(block => {
                    const hasMiddle = block.includes('【中間】');
                    if (hasMiddle) {
                        const parts1 = block.split(/【中間】(?:：|:)?/);
                        const front = parts1[0].trim();
                        const parts2 = parts1[1].split(/【背面】(?:：|:)?/);
                        if (parts2.length >= 2) cards.push({ front, middle: parts2[0].trim(), back: parts2.slice(1).join('【背面】：').trim(), status: 'unrated', note: '' });
                    } else {
                        const parts = block.split(/【背面】(?:：|:)?/);
                        if (parts.length >= 2) cards.push({ front: parts[0].trim(), back: parts.slice(1).join('【背面】：').trim(), status: 'unrated', note: '' });
                    }
                });
                if (cards.length === 0) return alert("格式錯誤");
                if (decks.length === 0 || formData.importMode === 'new') {
                    const newDecks = [...decks, { category: formData.newDeckName || "新卡組", cards, color: DEFAULT_COLOR }];
                    updateDecks(newDecks); setActiveCategoryIndex(newDecks.length - 1);
                } else {
                    const newDecks = [...decks]; newDecks[activeCategoryIndex].cards.push(...cards); updateDecks(newDecks);
                }
                closeModal();
            };

            const handleFlip = () => totalCards > 0 && setFlipAngle(prev => prev + 180);
            const handleNext = React.useCallback(() => { if (totalCards > 1) { setFlipAngle(0); setTimeout(() => setCurrentCardIndex(p => (p + 1) % totalCards), 150); } }, [totalCards]);
            const handlePrev = React.useCallback(() => { if (totalCards > 1) { setFlipAngle(0); setTimeout(() => setCurrentCardIndex(p => (p - 1 + totalCards) % totalCards), 150); } }, [totalCards]);
            
            const handleRateAndNext = (e, status) => {
                if (e) e.stopPropagation();
                const nd = [...decks]; nd[activeCategoryIndex].cards[currentCard.originalIndex].status = status;
                updateDecks(nd); handleNext();
            };

            const handleAddDeck = () => { if (formData.deckName.trim()) { updateDecks([...decks, { category: formData.deckName, cards: [], color: DEFAULT_COLOR }]); closeModal(); } };
            const handleAddCard = () => {
                const nd = [...decks];
                const newCard = { front: formData.cardFront, back: formData.cardBack, status: 'unrated', note: '' };
                if (formData.cardType === '3sided' && formData.cardMiddle.trim()) newCard.middle = formData.cardMiddle;
                nd[activeCategoryIndex].cards.push(newCard);
                updateDecks(nd); closeModal();
            };

            const closeModal = () => {
                setModalState({ isOpen: false, type: null });
                setFormData({ deckName: '', cardFront: '', cardMiddle: '', cardBack: '', note: '', importText: '', importMode: 'append', newDeckName: '', cardType: '2sided', editIndex: null });
            };

            // 翻轉引擎邏輯
            const faces = React.useMemo(() => {
                if (!currentCard) return [];
                const faceMap = { F: { label: '正面', text: currentCard.front, theme: 'front' }, M: currentCard.middle ? { label: '中間', text: currentCard.middle, theme: 'middle' } : null, B: { label: '背面', text: currentCard.back, theme: 'back' } };
                return flipOrder.split('').map(k => faceMap[k]).filter(Boolean);
            }, [currentCard, flipOrder]);

            const step = Math.floor(flipAngle / 180);
            const domFront = faces[ (step % 2 === 0 ? step : step - 1) % faces.length ] || null;
            const domBack = faces[ (step % 2 === 1 ? step : Math.max(0, step - 1)) % faces.length ] || null;

            const getFaceClasses = (theme) => {
                if (theme === 'front') return { bg: 'bg-white', text: 'text-gray-800', badge: 'text-blue-500 bg-blue-50' };
                if (theme === 'middle') return { bg: 'bg-emerald-50', text: 'text-emerald-900', badge: 'text-emerald-600 bg-emerald-100' };
                if (theme === 'back') return { bg: 'bg-gray-800', text: 'text-white', badge: 'text-yellow-400 bg-gray-700' };
                return {};
            };

            return (
                <div className="min-h-screen flex flex-col items-center py-10 px-4">
                    <style>{`
                        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
                        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
                        .preserve-3d { transform-style: preserve-3d; }
                        .backface-hidden { backface-visibility: hidden; }
                        .rotate-y-180 { transform: rotateY(180deg); }
                        .perspective-1000 { perspective: 1000px; }
                    `}</style>

                    {/* 標題欄 */}
                    <div className="w-full max-w-4xl flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                        <div className="flex items-center gap-3">
                            <Icons.Cloud className="w-8 h-8 text-blue-500" />
                            <h1 className="text-3xl font-black text-gray-800 tracking-wide">苗寶雲端字卡</h1>
                        </div>
                        {user ? (
                            <div className="flex items-center gap-3 bg-white p-2 pr-5 rounded-full shadow-sm border">
                                <img src={user.photoURL} className="w-9 h-9 rounded-full" />
                                <span className="text-sm font-bold text-gray-700">{user.displayName}</span>
                                <button onClick={handleLogout} className="text-xs text-red-500 bg-red-50 px-3 py-1 rounded-full">登出</button>
                            </div>
                        ) : (
                            <button onClick={handleLogin} className="bg-blue-600 text-white px-6 py-2.5 rounded-full font-bold shadow-lg">🔑 登入 Google 同步</button>
                        )}
                    </div>

                    {!user ? (
                        <div className="w-full max-w-2xl bg-white p-12 rounded-3xl shadow-xl text-center border mt-10">
                            <h2 className="text-2xl font-bold text-gray-800 mb-8">登入後開始雲端同步</h2>
                            <button onClick={handleLogin} className="bg-gray-800 text-white px-8 py-4 rounded-2xl font-bold">使用 Google 帳號登入</button>
                        </div>
                    ) : (
                        <div className="w-full max-w-4xl">
                            {/* 工具列 */}
                            <div className="flex flex-wrap justify-center gap-3 mb-8">
                                <button onClick={() => setModalState({ isOpen: true, type: 'importText' })} className="bg-white border px-4 py-2 rounded-full text-sm font-bold flex items-center shadow-sm text-gray-700"><Icons.FileText className="w-4 h-4 mr-2" /> 快速匯入</button>
                                <button onClick={handleExport} className="bg-white border px-4 py-2 rounded-full text-sm font-bold flex items-center shadow-sm text-gray-700"><Icons.Download className="w-4 h-4 mr-2" /> 匯出備份</button>
                                <button onClick={() => fileInputRef.current.click()} className="bg-white border px-4 py-2 rounded-full text-sm font-bold flex items-center shadow-sm text-gray-700"><Icons.Upload className="w-4 h-4 mr-2" /> 載入備份</button>
                                <input type="file" ref={fileInputRef} onChange={handleFileChange} className="hidden" />
                            </div>

                            {decks.length === 0 ? (
                                <div className="text-center bg-white p-12 rounded-3xl border-2 border-dashed border-gray-300">
                                    <Icons.PlusCircle />
                                    <button onClick={() => setModalState({ isOpen: true, type: 'addDeck' })} className="bg-blue-600 text-white px-8 py-3 rounded-full font-bold shadow-lg">建立第一個卡組</button>
                                </div>
                            ) : (
                                <div className="w-full max-w-2xl mx-auto">
                                    {/* 上方選擇卡組的分頁按鈕 */}
                                    <div className="flex overflow-x-auto custom-scrollbar bg-white p-2 rounded-2xl mb-6 border gap-2 items-center shadow-sm">
                                        {decks.map((cat, i) => (
                                            <button 
                                                key={i} 
                                                onClick={() => { setActiveCategoryIndex(i); setCurrentCardIndex(0); setFlipAngle(0); }} 
                                                className={`flex-shrink-0 px-5 py-2 rounded-xl text-sm font-bold transition-all shadow-sm`}
                                                style={activeCategoryIndex === i ? { backgroundColor: cat.color || DEFAULT_COLOR, color: 'white' } : { color: '#4b5563' }}
                                            >
                                                {cat.category}
                                            </button>
                                        ))}
                                        <button onClick={() => setModalState({ isOpen: true, type: 'addDeck' })} className="flex-shrink-0 px-4 py-2 text-blue-600 font-bold text-sm">+ 新增</button>
                                    </div>

                                    {/* 卡組名稱(黑色) 與 顏色選擇器 */}
                                    <div className="flex justify-between items-center mb-4 px-2">
                                        <div className="flex items-center gap-3">
                                            {/* 字體保持黑色 */}
                                            <span className="font-bold text-xl text-gray-900">{currentCategory.category}</span>
                                            
                                            {/* 顏色選擇器 */}
                                            <div className="relative flex items-center">
                                                <input 
                                                    type="color" 
                                                    value={currentDeckColor} 
                                                    onChange={(e) => handleUpdateDeckColor(e.target.value)}
                                                    className="w-7 h-7 rounded-full cursor-pointer border-2 border-white shadow-sm appearance-none overflow-hidden"
                                                    title="更改此卡組的主題顏色"
                                                />
                                            </div>

                                            <select value={is3Sided ? flipOrder : (flipOrder.includes('FB') ? 'FB' : 'BF')} onChange={(e) => setFlipOrder(e.target.value === 'FB' ? 'FMB' : (e.target.value === 'BF' ? 'BMF' : e.target.value))} className="text-xs bg-gray-200 px-3 py-1.5 rounded-full font-bold outline-none cursor-pointer">
                                                <option value="FMB">正➔中➔背</option>
                                                <option value="FBM">正➔背➔中</option>
                                                <option value="FB">正➔背</option>
                                                <option value="BF">背➔正</option>
                                            </select>
                                        </div>
                                        <div className="flex gap-2">
                                            <select value={filterStatus} onChange={(e) => {setFilterStatus(e.target.value); setCurrentCardIndex(0);}} className="text-sm font-bold px-3 py-2 rounded-xl bg-white border shadow-sm outline-none">
                                                <option value="all">全部</option>
                                                <option value="unfamiliar">🔴 不熟</option>
                                                <option value="familiar">🟡 印象</option>
                                                <option value="mastered">🟢 精熟</option>
                                            </select>
                                            <button onClick={() => setModalState({isOpen: true, type: 'cardList'})} className="p-2 bg-blue-50 text-blue-600 border rounded-xl shadow-sm"><Icons.List className="w-5 h-5" /></button>
                                            <button onClick={() => setModalState({isOpen: true, type: 'deleteDeck'})} className="p-2 text-gray-400 bg-white border rounded-xl shadow-sm"><Icons.Trash2 className="w-4 h-4" /></button>
                                        </div>
                                    </div>

                                    {/* 卡片主體 */}
                                    <div className="aspect-[16/10] perspective-1000 mb-4 w-full">
                                        {totalCards > 0 ? (
                                            <div key={currentCard?.originalIndex} className="relative w-full h-full preserve-3d cursor-pointer" style={{ transform: `rotateY(${flipAngle}deg)`, transition: 'transform 0.5s' }} onClick={handleFlip}>
                                                
                                                {/* 正面面盆 */}
                                                <div 
                                                    className={`absolute w-full h-full backface-hidden rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 border-t-[6px] text-center overflow-y-auto custom-scrollbar ${getFaceClasses(domFront?.theme).bg}`}
                                                    style={{ borderTopColor: currentDeckColor }}
                                                >
                                                    <div className="absolute top-4 text-xs font-bold text-gray-400">{currentCardIndex + 1} / {totalCards}</div>
                                                    <div className={`absolute top-5 left-6 text-xs font-black px-3 py-1 rounded-full uppercase ${getFaceClasses(domFront?.theme).badge}`}>{domFront?.label}</div>
                                                    <div className={`font-bold whitespace-pre-wrap leading-relaxed w-full px-4 text-3xl ${getFaceClasses(domFront?.theme).text}`}>{domFront?.text}</div>
                                                    <button onClick={(e) => handleSpeak(e, domFront?.text)} className="mt-6 p-3 bg-white/50 border rounded-full shadow-sm"><Icons.Volume2 className="w-5 h-5" /></button>
                                                </div>

                                                {/* 背面面盆 */}
                                                <div 
                                                    className={`absolute w-full h-full backface-hidden rotate-y-180 rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 border-t-[6px] text-center overflow-y-auto custom-scrollbar ${getFaceClasses(domBack?.theme).bg}`}
                                                    style={{ borderTopColor: currentDeckColor }}
                                                >
                                                    <div className="absolute top-4 text-xs font-bold text-gray-500">{currentCardIndex + 1} / {totalCards}</div>
                                                    <div className={`absolute top-5 left-6 text-xs font-black px-3 py-1 rounded-full uppercase ${getFaceClasses(domBack?.theme).badge}`}>{domBack?.label}</div>
                                                    <div className={`font-bold whitespace-pre-wrap leading-relaxed w-full px-4 text-3xl ${getFaceClasses(domBack?.theme).text}`}>{domBack?.text}</div>
                                                    <button onClick={(e) => handleSpeak(e, domBack?.text)} className="mt-6 p-3 bg-black/20 border border-transparent rounded-full shadow-sm"><Icons.Volume2 className="w-5 h-5" /></button>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="w-full h-full bg-white rounded-3xl border-2 border-dashed flex items-center justify-center flex-col">
                                                <button onClick={() => setModalState({isOpen: true, type: 'addCard'})} className="text-blue-600 font-bold px-8 py-3 rounded-full border border-blue-100">+ 新增字卡</button>
                                            </div>
                                        )}
                                    </div>

                                    {/* 控制按鈕 */}
                                    {totalCards > 0 && (
                                        <React.Fragment>
                                            <div className="grid grid-cols-3 gap-3 mb-4">
                                                <button onClick={(e) => handleRateAndNext(e, 'unfamiliar')} className="bg-red-50 text-red-600 py-4 rounded-2xl font-bold shadow-sm hover:bg-red-100">不熟</button>
                                                <button onClick={(e) => handleRateAndNext(e, 'familiar')} className="bg-yellow-50 text-yellow-600 py-4 rounded-2xl font-bold shadow-sm hover:bg-yellow-100">有印象</button>
                                                <button onClick={(e) => handleRateAndNext(e, 'mastered')} className="bg-green-50 text-green-600 py-4 rounded-2xl font-bold shadow-sm hover:bg-green-100">精熟</button>
                                            </div>
                                            <div className="flex items-center justify-center gap-3 bg-white p-3 rounded-2xl border shadow-sm">
                                                <button onClick={handlePrev} className="w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center hover:bg-gray-200"><Icons.ChevronLeft className="w-5 h-5"/></button>
                                                <button onClick={() => setModalState({isOpen: true, type: 'addCard'})} className="px-6 py-2 bg-blue-600 text-white rounded-full font-bold text-sm shadow-md">+ 新增</button>
                                                <button onClick={openNoteModal} className="px-6 py-2 bg-indigo-50 text-indigo-600 rounded-full font-bold text-sm">備註</button>
                                                <button onClick={handleNext} className="w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center hover:bg-gray-200"><Icons.ChevronRight className="w-5 h-5"/></button>
                                            </div>
                                        </React.Fragment>
                                    )}
                                </div>
                            )}
                        </div>
                    )}

                    {/* 彈出視窗模組 (簡化但完整) */}
                    {modalState.isOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex justify-center items-center z-50 p-4">
                            <div className="bg-white rounded-3xl p-8 w-full max-w-md relative shadow-2xl">
                                <button onClick={closeModal} className="absolute top-6 right-6 text-gray-400 hover:bg-gray-100 p-2 rounded-full"><Icons.X className="w-5 h-5" /></button>
                                
                                {modalState.type === 'addDeck' && (
                                    <div>
                                        <h3 className="text-xl font-bold mb-6">建立新卡組</h3>
                                        <input autoFocus type="text" className="w-full border p-4 rounded-2xl mb-6 bg-gray-50 outline-none focus:bg-white border-gray-100 focus:border-blue-500 transition-all" placeholder="輸入名稱..." value={formData.deckName} onChange={e => setFormData({...formData, deckName: e.target.value})} onKeyDown={e => e.key === 'Enter' && handleAddDeck()} />
                                        <button onClick={handleAddDeck} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">確認建立</button>
                                    </div>
                                )}

                                {modalState.type === 'addCard' && (
                                    <div>
                                        <h3 className="text-xl font-bold mb-6">新增字卡</h3>
                                        <div className="flex gap-4 mb-4 bg-gray-50 p-2 rounded-xl">
                                            <label className="flex-1 flex items-center justify-center gap-2 cursor-pointer p-2 rounded-lg has-[:checked]:bg-white has-[:checked]:shadow-sm">
                                                <input type="radio" checked={formData.cardType === '2sided'} onChange={() => setFormData({...formData, cardType: '2sided'})} className="hidden" /> <span>雙面</span>
                                            </label>
                                            <label className="flex-1 flex items-center justify-center gap-2 cursor-pointer p-2 rounded-lg has-[:checked]:bg-white has-[:checked]:shadow-sm">
                                                <input type="radio" checked={formData.cardType === '3sided'} onChange={() => setFormData({...formData, cardType: '3sided'})} className="hidden" /> <span>三面</span>
                                            </label>
                                        </div>
                                        <textarea autoFocus rows="2" className="w-full border p-4 rounded-2xl mb-4 bg-gray-50 outline-none focus:bg-white" placeholder="正面" value={formData.cardFront} onChange={e => setFormData({...formData, cardFront: e.target.value})}></textarea>
                                        {formData.cardType === '3sided' && <textarea rows="2" className="w-full border p-4 rounded-2xl mb-4 bg-emerald-50/50 outline-none focus:bg-white" placeholder="中間 (發音)" value={formData.cardMiddle} onChange={e => setFormData({...formData, cardMiddle: e.target.value})}></textarea>}
                                        <textarea rows="2" className="w-full border p-4 rounded-2xl mb-6 bg-gray-50 outline-none focus:bg-white" placeholder="背面" value={formData.cardBack} onChange={e => setFormData({...formData, cardBack: e.target.value})}></textarea>
                                        <button onClick={handleAddCard} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">儲存並同步</button>
                                    </div>
                                )}

                                {modalState.type === 'importText' && (
                                    <div>
                                        <h3 className="text-xl font-bold mb-4">文字快速匯入</h3>
                                        <div className="flex gap-2 mb-6">
                                            <button onClick={() => handleCopyAIPrompt('2sided')} className="flex-1 text-xs font-bold bg-purple-50 text-purple-600 py-2 rounded-xl border border-purple-100">✨ 雙面提示詞</button>
                                            <button onClick={() => handleCopyAIPrompt('3sided')} className="flex-1 text-xs font-bold bg-emerald-50 text-emerald-600 py-2 rounded-xl border border-emerald-100">✨ 三面提示詞</button>
                                        </div>
                                        <textarea rows="6" className="w-full border p-4 rounded-2xl mb-6 text-sm bg-gray-50 outline-none" placeholder={"【正面】：Apple\n【背面】：蘋果"} value={formData.importText} onChange={e => setFormData({...formData, importText: e.target.value})}></textarea>
                                        <button onClick={handleTextImport} className="w-full bg-gray-800 text-white py-4 rounded-2xl font-bold shadow-lg">開始解析</button>
                                    </div>
                                )}

                                {modalState.type === 'deleteDeck' && (
                                    <div className="text-center">
                                        <div className="bg-red-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 text-red-500"><Icons.Trash2 className="w-10 h-10" /></div>
                                        <h3 className="text-2xl font-bold mb-4">確定要刪除卡組？</h3>
                                        <p className="text-gray-500 mb-8 leading-relaxed">刪除後雲端資料也將同步移除，<br/>操作無法復原。</p>
                                        <div className="flex gap-4">
                                            <button onClick={closeModal} className="flex-1 bg-gray-100 py-4 rounded-2xl font-bold">取消</button>
                                            <button onClick={() => { const nd = decks.filter((_, i) => i !== activeCategoryIndex); updateDecks(nd); setActiveCategoryIndex(0); closeModal(); }} className="flex-1 bg-red-500 text-white py-4 rounded-2xl font-bold shadow-lg">確定刪除</button>
                                        </div>
                                    </div>
                                )}
                                
                                {modalState.type === 'editNote' && (
                                    <div>
                                        <h3 className="text-xl font-bold mb-4">卡片備註</h3>
                                        <textarea rows="6" className="w-full border p-4 rounded-2xl mb-6 bg-gray-50 focus:bg-white outline-none" placeholder="輸入記憶點、例句..." value={formData.note} onChange={e => setFormData({...formData, note: e.target.value})}></textarea>
                                        <button onClick={handleSaveNote} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold">儲存備註</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
