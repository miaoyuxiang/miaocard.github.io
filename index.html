<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苗寶雲端字卡系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // 1. 引入 Firebase SDK
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 2. Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyBMqOn8ihqPxWP7L1rKMMH07t8Y8QSX_Zs",
            authDomain: "miaocard.firebaseapp.com",
            projectId: "miaocard",
            storageBucket: "miaocard.firebasestorage.app",
            messagingSenderId: "39206538337",
            appId: "1:39206538337:web:8b1712d916038e4ce6ae20",
            measurementId: "G-5V0PWWG70Z"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // 3. 圖示組件
        const Icons = {
            PlusCircle: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-16 h-16 text-blue-300 mx-auto mb-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>,
            Plus: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Trash2: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            X: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            RotateCcw: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>,
            ChevronLeft: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
            ChevronRight: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
            Star: ({className, fill="none"}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
            Cloud: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19c3.037 0 5.5-2.463 5.5-5.5 0-2.77-2.053-5.06-4.73-5.412C17.343 4.316 14.113 1.5 10 1.5 6.012 1.5 2.71 3.99 1.63 7.428 0.7 8.24 0 9.54 0 11c0 2.21 1.79 4 4 4h13.5"/></svg>
        };

        const App = () => {
            const [user, setUser] = React.useState(null);
            const [decks, setDecks] = React.useState([]);
            const [activeCategoryIndex, setActiveCategoryIndex] = React.useState(0);
            const [currentCardIndex, setCurrentCardIndex] = React.useState(0);
            const [isFlipped, setIsFlipped] = React.useState(false);
            const [showStarredOnly, setShowStarredOnly] = React.useState(false);
            const [modalState, setModalState] = React.useState({ isOpen: false, type: null });
            const [formData, setFormData] = React.useState({ deckName: '', cardFront: '', cardBack: '', importText: '', importMode: 'append', newDeckName: '' });

            // 監聽登入狀態
            React.useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    if (!currentUser) setDecks([]);
                });
                return () => unsubscribe();
            }, []);

            // 監聽雲端資料庫
            React.useEffect(() => {
                if (!user) return;
                const unsub = onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                    if (docSnap.exists()) {
                        setDecks(docSnap.data().decks || []);
                    }
                });
                return () => unsub();
            }, [user]);

            // 同步至雲端
            const syncToCloud = async (newDecks) => {
                if (!user) return;
                await setDoc(doc(db, "users", user.uid), { decks: newDecks });
            };

            const handleLogin = () => signInWithPopup(auth, provider);
            const handleLogout = () => signOut(auth);

            // 資料操作邏輯 (封裝同步)
            const updateDecks = (newDecks) => {
                setDecks(newDecks);
                syncToCloud(newDecks);
            };

            const handleAddDeck = () => {
                if (!formData.deckName.trim()) return;
                const newDecks = [...decks, { category: formData.deckName, cards: [] }];
                updateDecks(newDecks);
                setActiveCategoryIndex(decks.length);
                closeModal();
            };

            const handleAddCard = () => {
                if (!formData.cardFront.trim() || !formData.cardBack.trim()) return;
                const newDecks = [...decks];
                newDecks[activeCategoryIndex].cards.push({ front: formData.cardFront, back: formData.cardBack, isStarred: false });
                updateDecks(newDecks);
                setCurrentCardIndex(newDecks[activeCategoryIndex].cards.length - 1);
                closeModal();
            };

            const handleDeleteCard = () => {
                const newDecks = [...decks];
                newDecks[activeCategoryIndex].cards.splice(currentCard.originalIndex, 1);
                updateDecks(newDecks);
                setCurrentCardIndex(Math.max(0, currentCardIndex - 1));
                closeModal();
            };

            const handleToggleStar = (e) => {
                e.stopPropagation();
                const newDecks = [...decks];
                const originalIdx = currentCard.originalIndex;
                newDecks[activeCategoryIndex].cards[originalIdx].isStarred = !newDecks[activeCategoryIndex].cards[originalIdx].isStarred;
                updateDecks(newDecks);
            };

            const closeModal = () => {
                setModalState({ isOpen: false, type: null });
                setFormData({ ...formData, deckName: '', cardFront: '', cardBack: '', importText: '' });
            };

            // 渲染輔助
            const currentCategory = decks[activeCategoryIndex] || null;
            const currentCardsWithIdx = (currentCategory?.cards || []).map((c, idx) => ({ ...c, originalIndex: idx }));
            const currentCards = showStarredOnly ? currentCardsWithIdx.filter(c => c.isStarred) : currentCardsWithIdx;
            const currentCard = currentCards[currentCardIndex] || null;
            const totalCards = currentCards.length;

            return (
                <div className="min-h-screen flex flex-col items-center py-10 px-4 bg-slate-50">
                    <div className="w-full max-w-4xl flex justify-between items-center mb-8">
                        <div className="flex items-center gap-2">
                            <Icons.Cloud className="w-8 h-8 text-blue-500" />
                            <h1 className="text-2xl font-black text-slate-800">苗寶雲端字卡</h1>
                        </div>
                        
                        {user ? (
                            <div className="flex items-center gap-3 bg-white p-2 pr-4 rounded-full shadow-sm border">
                                <img src={user.photoURL} className="w-8 h-8 rounded-full" />
                                <span className="text-sm font-bold text-slate-600">{user.displayName}</span>
                                <button onClick={handleLogout} className="text-xs text-red-400 hover:text-red-600">登出</button>
                            </div>
                        ) : (
                            <button onClick={handleLogin} className="bg-blue-600 text-white px-6 py-2 rounded-full text-sm font-bold shadow-lg hover:bg-blue-700 transition-all">
                                🔑 登入 Google 同步
                            </button>
                        )}
                    </div>

                    {!user ? (
                        <div className="w-full max-w-md bg-white p-12 rounded-3xl shadow-xl text-center border">
                            <h2 className="text-xl font-bold text-slate-700 mb-4">歡迎使用同步系統</h2>
                            <p className="text-slate-500 mb-8">登入後即可在電腦與手機間自動同步字卡，學習不中斷！</p>
                            <button onClick={handleLogin} className="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold hover:bg-black transition-colors">使用 Google 帳號登入</button>
                        </div>
                    ) : (
                        <div className="w-full max-w-2xl">
                            {/* 卡組選擇 */}
                            <div className="flex overflow-x-auto pb-4 gap-2 no-scrollbar">
                                {decks.map((cat, i) => (
                                    <button 
                                        key={i} 
                                        onClick={() => { setActiveCategoryIndex(i); setCurrentCardIndex(0); setIsFlipped(false); }}
                                        className={`px-5 py-2 rounded-full whitespace-nowrap text-sm font-bold transition-all ${activeCategoryIndex === i ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-500 hover:bg-slate-100'}`}
                                    >
                                        {cat.category}
                                    </button>
                                ))}
                                <button onClick={() => setModalState({ isOpen: true, type: 'addDeck' })} className="px-5 py-2 rounded-full bg-blue-50 text-blue-600 text-sm font-bold border border-blue-100">+</button>
                            </div>

                            {decks.length === 0 ? (
                                <div className="bg-white p-20 rounded-3xl border-2 border-dashed text-center">
                                    <button onClick={() => setModalState({ isOpen: true, type: 'addDeck' })} className="text-blue-500 font-bold">建立第一個卡組</button>
                                </div>
                            ) : (
                                <React.Fragment>
                                    {/* 字卡主體 */}
                                    <div className="relative aspect-[4/3] md:aspect-[16/10] perspective-1000 my-6" onClick={() => totalCards > 0 && setIsFlipped(!isFlipped)}>
                                        {totalCards === 0 ? (
                                            <div className="w-full h-full bg-white rounded-3xl border-2 border-dashed flex items-center justify-center">
                                                <button onClick={() => setModalState({ isOpen: true, type: 'addCard' })} className="text-slate-400 font-bold">+ 新增字卡</button>
                                            </div>
                                        ) : (
                                            <div className={`relative w-full h-full transition-transform duration-500 preserve-3d cursor-pointer ${isFlipped ? 'rotate-y-180' : ''}`}>
                                                {/* 正面 */}
                                                <div className="absolute inset-0 backface-hidden bg-white rounded-3xl shadow-xl border-b-8 border-blue-500 flex flex-col items-center justify-center p-10 text-center">
                                                    <div className="absolute top-6 left-6 text-xs font-black text-blue-500 tracking-widest uppercase">Front</div>
                                                    <button onClick={handleToggleStar} className="absolute top-6 right-6 text-slate-200 hover:text-yellow-400 transition-colors">
                                                        <Icons.Star className="w-6 h-6" fill={currentCard?.isStarred ? "#fbbf24" : "none"} />
                                                    </button>
                                                    <div className="text-3xl font-bold text-slate-800 leading-relaxed">{currentCard?.front}</div>
                                                </div>
                                                {/* 背面 */}
                                                <div className="absolute inset-0 backface-hidden rotate-y-180 bg-slate-800 rounded-3xl shadow-xl border-b-8 border-yellow-500 flex flex-col items-center justify-center p-10 text-center">
                                                    <div className="absolute top-6 left-6 text-xs font-black text-yellow-500 tracking-widest uppercase">Back</div>
                                                    <div className="text-2xl font-medium text-white leading-relaxed">{currentCard?.back}</div>
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    {/* 控制列 */}
                                    <div className="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border">
                                        <div className="flex items-center gap-4">
                                            <button 
                                                onClick={() => { setShowStarredOnly(!showStarredOnly); setCurrentCardIndex(0); }}
                                                className={`p-2 rounded-lg transition-colors ${showStarredOnly ? 'bg-yellow-100 text-yellow-600' : 'text-slate-400 hover:bg-slate-50'}`}
                                            >
                                                <Icons.Star className="w-5 h-5" fill={showStarredOnly ? "currentColor" : "none"} />
                                            </button>
                                            <span className="text-sm font-bold text-slate-400">{totalCards > 0 ? currentCardIndex + 1 : 0} / {totalCards}</span>
                                        </div>

                                        <div className="flex gap-2">
                                            <button onClick={(e) => { e.stopPropagation(); setCurrentCardIndex(prev => (prev - 1 + totalCards) % totalCards); setIsFlipped(false); }} className="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full hover:bg-slate-200"><Icons.ChevronLeft className="w-6 h-6" /></button>
                                            <button onClick={() => setModalState({ isOpen: true, type: 'addCard' })} className="px-6 bg-blue-600 text-white rounded-full font-bold text-sm">新增</button>
                                            <button onClick={(e) => { e.stopPropagation(); setCurrentCardIndex(prev => (prev + 1) % totalCards); setIsFlipped(false); }} className="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full hover:bg-slate-200"><Icons.ChevronRight className="w-6 h-6" /></button>
                                        </div>

                                        <button onClick={() => setModalState({ isOpen: true, type: 'deleteCard' })} className="text-slate-300 hover:text-red-500"><Icons.Trash2 className="w-5 h-5" /></button>
                                    </div>
                                </React.Fragment>
                            )}
                        </div>
                    )}

                    {/* 彈窗模組 */}
                    {modalState.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex justify-center items-center z-50 p-4">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 relative">
                                <button onClick={closeModal} className="absolute top-6 right-6 text-slate-400"><Icons.X className="w-6 h-6" /></button>
                                
                                {modalState.type === 'addDeck' && (
                                    <div>
                                        <h3 className="text-xl font-bold mb-6">建立新卡組</h3>
                                        <input autoFocus type="text" className="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl mb-4 focus:border-blue-500 outline-none transition-all" placeholder="卡組名稱" value={formData.deckName} onChange={e => setFormData({...formData, deckName: e.target.value})} />
                                        <button onClick={handleAddDeck} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">確認建立</button>
                                    </div>
                                )}

                                {modalState.type === 'addCard' && (
                                    <div>
                                        <h3 className="text-xl font-bold mb-6">新增字卡</h3>
                                        <textarea autoFocus className="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl mb-4 h-24 outline-none focus:border-blue-500" placeholder="正面內容" value={formData.cardFront} onChange={e => setFormData({...formData, cardFront: e.target.value})}></textarea>
                                        <textarea className="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl mb-6 h-24 outline-none focus:border-blue-500" placeholder="背面翻譯或解釋" value={formData.cardBack} onChange={e => setFormData({...formData, cardBack: e.target.value})}></textarea>
                                        <button onClick={handleAddCard} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">儲存字卡</button>
                                    </div>
                                )}

                                {modalState.type === 'deleteCard' && (
                                    <div className="text-center">
                                        <div className="bg-red-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-red-500">
                                            <Icons.Trash2 className="w-8 h-8" />
                                        </div>
                                        <h3 className="text-xl font-bold mb-2">確定刪除此卡？</h3>
                                        <p className="text-slate-500 mb-8">刪除後雲端資料也將同步移除。</p>
                                        <div className="flex gap-3">
                                            <button onClick={closeModal} className="flex-1 py-4 font-bold text-slate-400">取消</button>
                                            <button onClick={handleDeleteCard} className="flex-1 bg-red-500 text-white py-4 rounded-2xl font-bold">確定刪除</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <style>{`
                        .preserve-3d { transform-style: preserve-3d; }
                        .backface-hidden { backface-visibility: hidden; }
                        .rotate-y-180 { transform: rotateY(180deg); }
                        .perspective-1000 { perspective: 1000px; }
                        .no-scrollbar::-webkit-scrollbar { display: none; }
                    `}</style>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
