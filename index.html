<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苗寶雲端字卡系統 (四階評估記憶版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // 1. 引入 Firebase SDK
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 2. Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyBMqOn8ihqPxWP7L1rKMMH07t8Y8QSX_Zs",
            authDomain: "miaocard.firebaseapp.com",
            projectId: "miaocard",
            storageBucket: "miaocard.firebasestorage.app",
            messagingSenderId: "39206538337",
            appId: "1:39206538337:web:8b1712d916038e4ce6ae20",
            measurementId: "G-5V0PWWG70Z"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        setPersistence(auth, browserLocalPersistence).catch(console.error);

        // 3. 圖示組件
        const Icons = {
            PlusCircle: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-16 h-16 text-blue-300 mx-auto mb-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>,
            Plus: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Trash2: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            Edit: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            X: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            RotateCcw: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>,
            ChevronLeft: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
            ChevronRight: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
            SkipBack: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>,
            List: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
            Shuffle: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>,
            Download: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Upload: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            FileText: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
            Cloud: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19c3.037 0 5.5-2.463 5.5-5.5 0-2.77-2.053-5.06-4.73-5.412C17.343 4.316 14.113 1.5 10 1.5 6.012 1.5 2.71 3.99 1.63 7.428 0.7 8.24 0 9.54 0 11c0 2.21 1.79 4 4 4h13.5"/></svg>,
            Volume2: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
        };

        const App = () => {
            // 狀態管理
            const [user, setUser] = React.useState(null);
            const [decks, setDecks] = React.useState([]);
            const [activeCategoryIndex, setActiveCategoryIndex] = React.useState(0);
            const [currentCardIndex, setCurrentCardIndex] = React.useState(0);
            
            const [filterStatus, setFilterStatus] = React.useState('all'); 
            const [flipOrder, setFlipOrder] = React.useState('FMB'); 
            const [selectedCards, setSelectedCards] = React.useState(new Set()); 
            
            const [modalState, setModalState] = React.useState({ isOpen: false, type: null });
            const [flipAngle, setFlipAngle] = React.useState(0);
            const [formData, setFormData] = React.useState({ deckName: '', cardFront: '', cardMiddle: '', cardBack: '', note: '', importText: '', importMode: 'append', newDeckName: '', cardType: '2sided', editIndex: null });
            
            const fileInputRef = React.useRef(null);
            const DEFAULT_COLOR = "#503422"; // 預設顏色
            
            // 監聽登入狀態
            React.useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    if (!currentUser) setDecks([]);
                });
                return () => unsubscribe();
            }, []);

            // 監聽雲端資料庫
            React.useEffect(() => {
                if (!user) return;
                const unsub = onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                    if (docSnap.exists()) {
                        setDecks(docSnap.data().decks || []);
                    }
                });
                return () => unsub();
            }, [user]);

            // 同步至雲端
            const syncToCloud = async (newDecks) => {
                if (!user) return;
                await setDoc(doc(db, "users", user.uid), { decks: newDecks });
            };

            const updateDecks = (newDecks) => {
                setDecks(newDecks);
                syncToCloud(newDecks);
            };

            const handleLogin = () => {
                setPersistence(auth, browserLocalPersistence)
                    .then(() => signInWithPopup(auth, provider))
                    .catch(console.error);
            };
            
            const handleLogout = () => signOut(auth);

            // 資料計算
            const currentCategory = decks[activeCategoryIndex] || null;
            const allCards = currentCategory?.cards || [];
            const activeColor = currentCategory?.color || DEFAULT_COLOR; // 取得當前色系
            
            const currentCardsWithIdx = allCards.map((c, idx) => {
                let status = c.status;
                if (!status) status = c.isStarred ? 'mastered' : 'unrated';
                return { ...c, status, originalIndex: idx };
            });

            const currentCards = filterStatus === 'all' 
                ? currentCardsWithIdx 
                : currentCardsWithIdx.filter(c => c.status === filterStatus);
            
            const currentCard = currentCards[currentCardIndex] || null;
            const totalCards = currentCards.length;
            const is3Sided = Boolean(currentCard && currentCard.middle);

            // ===== 各種操作函式 =====

            // 變更卡組顏色
            const handleUpdateDeckColor = (newColor) => {
                const newDecks = [...decks];
                newDecks[activeCategoryIndex].color = newColor;
                updateDecks(newDecks);
            };

            const handleExport = () => {
                if (decks.length === 0) return;
                const dataStr = JSON.stringify(decks, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `flashcards_cloud_backup.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };

            const handleFileChange = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        if (Array.isArray(importedData)) {
                            if (window.confirm("確定要覆蓋目前雲端資料嗎？操作無法復原。")) {
                                updateDecks(importedData);
                            }
                        }
                    } catch (error) { alert("讀取失敗"); }
                };
                reader.readAsText(file);
                event.target.value = null; 
            };

            const handleSpeak = (e, text) => {
                if (e) e.stopPropagation();
                if (!text || !window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                if (/[\u3040-\u309f\u30a0-\u30ff]/.test(text)) utterance.lang = 'ja-JP'; 
                else if (/^[A-Za-z0-9\s.,!?'-]+$/.test(text)) utterance.lang = 'en-US'; 
                else utterance.lang = 'zh-TW'; 
                window.speechSynthesis.speak(utterance);
            };

            const handleCopyAIPrompt = (type) => {
                const promptText = type === '2sided' 
                    ? "請幫我製作字卡，並嚴格使用以下格式輸出：\n\n【正面】：(題目)\n【背面】：(答案)"
                    : "請幫我製作字卡，並嚴格使用以下格式輸出：\n\n【正面】：(題目)\n【中間】：(發音或補充)\n【背面】：(答案)";
                navigator.clipboard.writeText(promptText).then(() => alert("✅ 已複製 AI 提示詞！"));
            };

            const handleTextImport = () => {
                if (!formData.importText.trim()) return;
                const cards = [];
                const blocks = formData.importText.split(/【正面】(?:：|:)?/).filter(b => b.trim() !== '');
                blocks.forEach(block => {
                    if (block.includes('【中間】')) {
                        const p1 = block.split(/【中間】(?:：|:)?/);
                        const p2 = p1[1].split(/【背面】(?:：|:)?/);
                        if (p2.length >= 2) cards.push({ front: p1[0].trim(), middle: p2[0].trim(), back: p2.slice(1).join('【背面】：').trim(), note: '', status: 'unrated' });
                    } else {
                        const p = block.split(/【背面】(?:：|:)?/);
                        if (p.length >= 2) cards.push({ front: p[0].trim(), back: p.slice(1).join('【背面】：').trim(), note: '', status: 'unrated' });
                    }
                });
                if (cards.length === 0) return alert("格式錯誤");

                if (decks.length === 0 || formData.importMode === 'new') {
                    const newName = formData.newDeckName.trim() || "新匯入卡組";
                    const newDecks = [...decks, { category: newName, cards: cards, color: DEFAULT_COLOR }];
                    updateDecks(newDecks);
                    setActiveCategoryIndex(newDecks.length - 1);
                } else {
                    const newDecks = [...decks];
                    newDecks[activeCategoryIndex].cards.push(...cards);
                    updateDecks(newDecks);
                }
                closeModal();
            };

            const handleFlip = () => totalCards > 0 && setFlipAngle(prev => prev + 180);
            const handleNext = React.useCallback(() => { if (totalCards > 1) { setFlipAngle(0); setTimeout(() => setCurrentCardIndex(p => (p + 1) % totalCards), 150); } }, [totalCards]);
            const handlePrev = React.useCallback(() => { if (totalCards > 1) { setFlipAngle(0); setTimeout(() => setCurrentCardIndex(p => (p - 1 + totalCards) % totalCards), 150); } }, [totalCards]);

            const handleRateAndNext = (e, status) => {
                if (e) e.stopPropagation();
                if (!currentCard) return;
                const newDecks = [...decks];
                newDecks[activeCategoryIndex].cards[currentCard.originalIndex].status = status;
                updateDecks(newDecks);
                handleNext();
            };

            const handleUpdateCardStatus = (originalIdx, newStatus) => {
                const newDecks = [...decks];
                newDecks[activeCategoryIndex].cards[originalIdx].status = newStatus;
                updateDecks(newDecks);
            };

            const handleDeleteCardFromList = (originalIdx) => {
                if(window.confirm("確定刪除嗎？")) {
                    const newDecks = [...decks];
                    newDecks[activeCategoryIndex].cards.splice(originalIdx, 1);
                    updateDecks(newDecks);
                }
            };

            const handleBatchDelete = () => {
                if(selectedCards.size === 0) return;
                if(window.confirm(`確定刪除選取的 ${selectedCards.size} 張嗎？`)) {
                    const newDecks = [...decks];
                    const indices = Array.from(selectedCards).sort((a,b)=>b-a);
                    indices.forEach(idx => newDecks[activeCategoryIndex].cards.splice(idx, 1));
                    updateDecks(newDecks);
                    setSelectedCards(new Set());
                }
            };

            const handleBatchStatus = (status) => {
                if(selectedCards.size === 0 || !status) return;
                const newDecks = [...decks];
                selectedCards.forEach(idx => newDecks[activeCategoryIndex].cards[idx].status = status);
                updateDecks(newDecks);
                setSelectedCards(new Set());
            };

            const openEditModal = (idx) => {
                const c = allCards[idx];
                setFormData({ ...formData, cardFront: c.front, cardMiddle: c.middle || '', cardBack: c.back, note: c.note || '', cardType: c.middle ? '3sided' : '2sided', editIndex: idx });
                setModalState({ isOpen: true, type: 'editCard' });
            };

            const handleAddDeck = () => {
                if (!formData.deckName.trim()) return;
                const newDecks = [...decks, { category: formData.deckName, cards: [], color: DEFAULT_COLOR }];
                updateDecks(newDecks);
                setActiveCategoryIndex(newDecks.length - 1);
                closeModal();
            };

            const handleAddCard = () => {
                if (!formData.cardFront.trim() || !formData.cardBack.trim()) return;
                const newDecks = [...decks];
                const newCard = { front: formData.cardFront, back: formData.cardBack, note: '', status: 'unrated' }; 
                if (formData.cardType === '3sided' && formData.cardMiddle.trim()) newCard.middle = formData.cardMiddle;
                newDecks[activeCategoryIndex].cards.push(newCard);
                updateDecks(newDecks);
                closeModal();
            };

            const handleEditCardSave = () => {
                const newDecks = [...decks];
                const updated = { ...newDecks[activeCategoryIndex].cards[formData.editIndex], front: formData.cardFront, back: formData.cardBack, note: formData.note };
                if (formData.cardType === '3sided' && formData.cardMiddle.trim()) updated.middle = formData.cardMiddle;
                else delete updated.middle;
                newDecks[activeCategoryIndex].cards[formData.editIndex] = updated;
                updateDecks(newDecks);
                closeModal();
            };

            const closeModal = () => {
                setModalState({ isOpen: false, type: null });
                setFormData(p => ({ ...p, deckName: '', cardFront: '', cardMiddle: '', cardBack: '', note: '', importText: '', newDeckName: '', editIndex: null }));
            };

            // ====== 翻轉引擎 ======
            const faces = React.useMemo(() => {
                if (!currentCard) return [];
                const faceMap = {
                    F: { label: '正面', text: currentCard.front, theme: 'front' },

                };

                                    </div>

                                                    <option value="familiar">🟡 印象</option>
                                                    <option value="mastered">🟢 精熟</option>
                                                </select>
                                                <button onClick={handleBatchDelete} className="text-sm font-bold px-4 py-2 bg-white text-red-500 border rounded-xl">刪除選取</button>
                                            </div>
                                        </div>
                                        <div className="max-h-[50vh] overflow-y-auto custom-scrollbar space-y-3">
                                            {allCards.map((c, idx) => (
                                                <div key={idx} className={`flex items-center justify-between p-4 rounded-2xl border transition-colors ${selectedCards.has(idx) ? 'bg-blue-50 border-blue-200' : 'bg-gray-50 border-gray-200'}`}>
                                                    <div className="flex items-center gap-3">
                                                        <input type="checkbox" checked={selectedCards.has(idx)} onChange={() => { const s = new Set(selectedCards); s.has(idx) ? s.delete(idx) : s.add(idx); setSelectedCards(s); }} />
                                                        <div className="font-bold text-gray-800">{c.front}</div>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => { closeModal(); openEditModal(idx); }} className="p-1.5 text-blue-500 bg-white border rounded-lg shadow-sm"><Icons.Edit className="w-4 h-4" /></button>
                                                        <button onClick={() => handleDeleteCardFromList(idx)} className="p-1.5 text-gray-400 bg-white border rounded-lg shadow-sm"><Icons.Trash2 className="w-4 h-4" /></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {modalState.type === 'editNote' && (
                                    <div>
                                        <h3 className="text-xl font-bold mb-4 flex items-center"><Icons.FileText className="w-6 h-6 mr-2 text-indigo-500" /> 專屬備註</h3>
                                        <textarea autoFocus rows="6" className="w-full border-2 border-gray-100 p-4 rounded-2xl mb-6 bg-gray-50 focus:bg-white outline-none" value={formData.note} onChange={e => setFormData({...formData, note: e.target.value})}></textarea>
                                        <button onClick={() => { const nd = [...decks]; nd[activeCategoryIndex].cards[currentCard.originalIndex].note = formData.note; updateDecks(nd); closeModal(); }} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg">儲存備註</button>
                                    </div>
                                )}

                                {modalState.type === 'addDeck' && (
                                    <div>
                                        <h3 className="text-xl font-bold mb-6">建立新卡組</h3>
                                        <input autoFocus type="text" className="w-full border-2 border-gray-100 p-4 rounded-2xl mb-6 bg-gray-50 outline-none" placeholder="卡組名稱" value={formData.deckName} onChange={e => setFormData({...formData, deckName: e.target.value})} onKeyDown={e => e.key === 'Enter' && handleAddDeck()} />
                                        <button onClick={handleAddDeck} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">確認建立</button>
                                    </div>
                                )}

                                {modalState.type === 'importText' && (
                                    <div>
                                        <h3 className="text-xl font-bold mb-4">快速匯入文字</h3>
                                        <div className="flex gap-2 mb-4">
                                            <button onClick={() => handleCopyAIPrompt('2sided')} className="flex-1 bg-purple-50 text-purple-600 py-2 rounded-xl text-xs font-bold shadow-sm">✨ 雙面提示詞</button>
                                            <button onClick={() => handleCopyAIPrompt('3sided')} className="flex-1 bg-emerald-50 text-emerald-600 py-2 rounded-xl text-xs font-bold shadow-sm">✨ 三面提示詞</button>
                                        </div>
                                        <textarea rows="6" className="w-full border-2 border-gray-100 p-4 rounded-2xl mb-6 bg-gray-50 outline-none" value={formData.importText} onChange={e => setFormData({...formData, importText: e.target.value})} placeholder="【正面】：Apple\n【背面】：蘋果"></textarea>
                                        <button onClick={handleTextImport} className="w-full bg-gray-800 text-white py-4 rounded-2xl font-bold">解析匯入</button>
                                    </div>
                                )}

                                {modalState.type === 'addCard' || modalState.type === 'editCard' ? (
                                    <div>
                                        <h3 className="text-xl font-bold mb-6">{modalState.type === 'addCard' ? '新增字卡' : '編輯字卡'}</h3>
                                        <div className="flex gap-4 mb-4 bg-gray-50 p-3 rounded-2xl">
                                            <label className="flex items-center gap-2 cursor-pointer"><input type="radio" checked={formData.cardType === '2sided'} onChange={() => setFormData({...formData, cardType: '2sided'})}/> 雙面</label>
                                            <label className="flex items-center gap-2 cursor-pointer"><input type="radio" checked={formData.cardType === '3sided'} onChange={() => setFormData({...formData, cardType: '3sided'})}/> 三面</label>
                                        </div>
                                        <textarea autoFocus rows="2" className="w-full border-2 border-gray-100 p-4 rounded-2xl mb-4" placeholder="正面" value={formData.cardFront} onChange={e => setFormData({...formData, cardFront: e.target.value})}></textarea>
                                        {formData.cardType === '3sided' && <textarea rows="2" className="w-full border-2 border-gray-100 p-4 rounded-2xl mb-4 bg-emerald-50" placeholder="中間" value={formData.cardMiddle} onChange={e => setFormData({...formData, cardMiddle: e.target.value})}></textarea>}
                                        <textarea rows="2" className="w-full border-2 border-gray-100 p-4 rounded-2xl mb-6" placeholder="背面" value={formData.cardBack} onChange={e => setFormData({...formData, cardBack: e.target.value})}></textarea>
                                        <button onClick={modalState.type === 'addCard' ? handleAddCard : handleEditCardSave} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">儲存並同步</button>
                                    </div>
                                ) : null}

                                {(modalState.type === 'deleteDeck' || modalState.type === 'deleteCard') && (
                                    <div className="text-center">
                                        <Icons.Trash2 className="w-16 h-16 text-red-500 mx-auto mb-6" />
                                        <h3 className="text-2xl font-bold mb-8">確定要刪除嗎？</h3>
                                        <div className="flex gap-4">
                                            <button onClick={closeModal} className="flex-1 bg-gray-100 py-4 rounded-2xl font-bold">取消</button>
                                            <button onClick={modalState.type === 'deleteDeck' ? handleDeleteDeck : handleDeleteCard} className="flex-1 bg-red-500 text-white py-4 rounded-2xl font-bold">確定刪除</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
